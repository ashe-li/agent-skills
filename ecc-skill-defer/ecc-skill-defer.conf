# ECC Skill Defer Config (aligned with ECC 1.10.0 module structure)
# Skills listed here will have SKILL.md renamed to SKILL.deferred.md
# so they won't load at init but can be restored on demand.
#
# Usage:
#   ecc-skill-defer.sh apply    — defer listed skills
#   ecc-skill-defer.sh restore <name> — activate a deferred skill
#   ecc-skill-defer.sh status   — show active/deferred counts
#   ecc-skill-defer.sh list     — show all skills with status
#
# Organisation follows install-modules.json module IDs.
# When ECC selective install supports per-skill granularity,
# whole-module sections can be replaced by --exclude flags.

